# Generated by Wave 2 of the OSPS audit (osps-baseline-audit.md).
# Narrowed: the `gomod` ecosystem was removed because backend/go.mod is synced from the
# michielvha/stackweaver monorepo and overwritten on every sync — Go dependencies are
# managed in the monorepo, not here. Only satellite-only ecosystems are scanned.
version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      docker-non-security:
        applies-to: version-updates
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions-non-security:
        applies-to: version-updates
        update-types: ["minor", "patch"]

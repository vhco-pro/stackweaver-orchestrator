server:
  host: "0.0.0.0"
  port: 8022
  read_timeout: 30s
  write_timeout: 30s

database:
  host: "localhost"
  port: 5432
  user: "iac"
  password: "iac_password"
  dbname: "iac_platform"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 10

storage:
  provider: "minio"
  minio:
    endpoint: "localhost:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    use_ssl: false
    bucket: "iac-state"
  s3:
    region: "us-east-1"
    bucket: "iac-state"

zitadel:
  issuer: "http://localhost:8080" # Read from ZITADEL_ISSUER environment variable (fallback)
  client_id: "" # Read from ZITADEL_API_CLIENT_ID environment variable
  client_secret: "" # Read from ZITADEL_API_CLIENT_SECRET environment variable

logging:
  level: "info"
  format: "json"

crypto:
  encryption_key: "" # Should be set via environment variable
